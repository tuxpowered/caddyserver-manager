name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Assets
        run: |
          mkdir -p release-assets
          tar -czf release-assets/caddy-manager-source.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*.db' \
            --exclude='*.log' \
            .
          cp install.sh release-assets/install.sh
          cp README.md release-assets/README.md

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-assets/caddy-manager-source.tar.gz
            release-assets/install.sh
            release-assets/README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
